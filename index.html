<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Line Screen Halftone</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <aside class="controls">
        <h2>Line Screen Halftone</h2>

        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept="image/*" />
          <p>Drop image here or <span>click to upload</span></p>
        </div>

        <div class="control-group">
          <label>Color Front</label>
          <div class="color-row">
            <input type="color" id="foregroundColor" value="#111459" />
            <input type="text" id="foregroundHex" value="#111459" maxlength="7" />
          </div>
        </div>

        <div class="control-group">
          <label>Color Back</label>
          <div class="color-row">
            <input type="color" id="backgroundColor" value="#C3B467" />
            <input type="text" id="backgroundHex" value="#C3B467" maxlength="7" />
          </div>
        </div>

        <div class="control-group">
          <label class="toggle-label">
            <input type="checkbox" id="invert" />
            Invert Color
          </label>
        </div>

        <div class="control-group">
          <label>Cell Size <span class="value" id="frequencyVal">40</span></label>
          <input type="range" id="frequency" min="5" max="150" value="40" step="1" />
        </div>

        <div class="control-group">
          <label>Contrast <span class="value" id="contrastVal">1.5</span></label>
          <input type="range" id="contrast" min="0.1" max="4.0" value="1.5" step="0.05" />
        </div>

        <div class="control-group">
          <label>Brightness <span class="value" id="brightnessVal">0.0</span></label>
          <input type="range" id="brightness" min="-0.5" max="0.5" value="0.0" step="0.01" />
        </div>

<button id="downloadBtn" disabled>Download PNG</button>
      </aside>

      <main class="preview">
        <div class="canvas-container" id="canvasContainer">
          <div class="placeholder" id="placeholder">
            <p>Upload an image to preview the effect</p>
          </div>
          <canvas id="canvas"></canvas>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
